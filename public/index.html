<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 18px; font-weight: 600; color: #7c3aed; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .msg.user { align-self: flex-end; background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .msg.agent { align-self: flex-start; background: #1e1e1e; border: 1px solid #333; border-bottom-left-radius: 4px; }
    #input-row { display: flex; gap: 8px; padding: 16px 24px; background: #1a1a1a; border-top: 1px solid #333; }
    #msg-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #262626; color: #e0e0e0; font-size: 14px; outline: none; }
    #msg-input:focus { border-color: #7c3aed; }
    button { padding: 10px 20px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <header>NanoClaw</header>
  <div id="chat"></div>
  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Message your agent..." autocomplete="off">
    <button onclick="sendMsg()">Send</button>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg-input');

    function addMsg(content, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMsg() {
      const content = input.value.trim();
      if (!content) return;
      input.value = '';
      addMsg(content, 'user');
      try {
        const res = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, groupId: 'main' }),
        });
        if (!res.ok) throw new Error('Request failed');
        addMsg('Message sent. Awaiting agent reply...', 'agent');
      } catch (e) {
        addMsg('Error sending message.', 'agent');
      }
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
  </script>
</body>
</html>
